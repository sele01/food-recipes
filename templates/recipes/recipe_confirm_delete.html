{% extends 'base.html' %}

{% block title %}Delete Recipe - Food Recipes{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Delete Recipe</h4>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-exclamation-triangle fa-4x text-warning mb-3"></i>
                <h5 class="mb-3">Are you sure you want to delete "{{ object.title }}"?</h5>
                <p class="text-muted mb-4">This action cannot be undone.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'recipes:recipe_detail' object.slug %}" 
                       class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
