{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4">Sign Up</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success">Sign Up</button>
            </form>
            <p class="mt-3">
                Already have an account? <a href="{% url 'account_login' %}">Log in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
