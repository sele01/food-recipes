{% extends "account/base.html" %}
{% load crispy_forms_tags %}
{% load socialaccount %}  <!-- ← ADD THIS -->

{% block account_content %}
<h2 class="text-center mb-4">Sign Up</h2>
<form method="post" action="{% url 'account_signup' %}">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-success w-100">Sign Up</button>
</form>
<hr>
<div class="text-center">
    <p>Or sign up with:</p>
    <a href="{% provider_login_url 'google' %}" class="btn btn-outline-danger">
        <i class="fab fa-google"></i> Google
    </a>
    <a href="{% provider_login_url 'github' %}" class="btn btn-outline-dark">
        <i class="fab fa-github"></i> GitHub
    </a>
</div>
<p class="text-center mt-3">
    Already have an account? <a href="{% url 'account_login' %}">Log in</a>
</p>
{% endblock %}
